<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register / Login</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding-top: 30px;">
    <div style="background: white; padding: 30px; display: inline-block; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); width: 300px;">
        <h2>🔐 Secure Login & Sign Up</h2>
        <p style="color: gray; font-size: 13px;">Shikayat darj karne ke liye apni details bharein</p>
        
        <form action="/signup" method="POST">
            <input type="text" name="username" placeholder="➡️ Apna Poora Naam" required style="padding: 10px; width: 90%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;"><br>
            <input type="email" name="email" placeholder="📧 Email Account / Google ID" required style="padding: 10px; width: 90%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;"><br>
            <input type="tel" name="phone" placeholder="📞 Phone Number" required style="padding: 10px; width: 90%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;"><br>
            <input type="password" name="password" placeholder="🔑 Password Banayein" required style="padding: 10px; width: 90%; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;"><br>
            
            <button type="submit" style="padding: 12px; width: 97%; background-color: #28a745; color: white; border: none; font-size: 16px; cursor: pointer; border-radius: 5px; font-weight: bold;">
                Login & Secure Entry
            </button>
        </form>
        
        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
            <p style="font-size: 13px; color: #555;">Yaa bina details ke check karein:</p>
            <a href="/guest" style="display: block; padding: 10px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; font-size: 14px; font-weight: bold;">
                👀 Continue as Guest (Sirf Dekhein)
            </a>
        </div>
    </div>
</body>
  </html>
